<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Estudiantil</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/estilos.css">
</head>

<body class="body-bg">

    <!-- HEADER -->
    <header class="header text-center p-3">
        <img src="img/logo.png" alt="Logo" class="logo" id="logo" crossorigin="anonymous">
        <h2 class="title">Mentor Estudiantil</h2>
    </header>

    <!-- FORMULARIO -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 form-container">

                <h4 class="text-center mb-4">Formulario de Registro</h4>

                <form id="formRegistro">

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" id="nombre" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Apellido</label>
                        <input type="text" id="apellido" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Correo</label>
                        <input type="email" id="correo" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Edad</label>
                        <input type="number" id="edad" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" id="password" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-custom w-100">
                        Registrarse
                    </button>
                    <div class="text-center mt-3">

<p class="separator">o</p>

    <button type="button" class="btn google-btn w-100" id="btnGoogle">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" class="google-icon">
        Continuar con Google
    </button>

</div>

                </form>

                <div id="mensaje" class="mt-3"></div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer text-center mt-5 p-3">
        Mentor Estudiantil copyright 2026
    </footer>

    <!-- LIBRERÍA COLOR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

    <!-- JS -->
   <script src="app.js"></script>
</body>
</html>
